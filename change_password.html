<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(to bottom,#0088cc,#2c3e50);
    display:flex;
    flex-direction:column;
}

/* Logo */

.logo{
    text-align:center;
    padding-top:5px;
}

.logo img{
    width:240px;
    max-width:90%;
}

/* Center Area */

.content{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:20px;
}

/* Card */

.card{
    width:350px;
    background:#f7f7f7;
    border-radius:8px;
    border:1px solid #d9d9d9;
    box-shadow:0 0 15px rgba(255,255,255,.6);
    overflow:hidden;
}

.card-header{
    text-align:center;
    color:#0088cc;
    font-size:22px;
    padding:15px;
}

.card-body{
    padding:18px;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-size:16px;
    font-weight:bold;
    color:#222;
}

.form-control{
    width:100%;
    height:40px;
    padding:10px;
    border:1px solid #d5d5d5;
    font-size:16px;
}

.form-control:focus{
    outline:none;
    border-color:#0088cc;
}

.btn{
    width:100%;
    height:50px;
    border:none;
    background:#0088cc;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.btn:hover{
    background:#0074b0;
}

@media(max-width:768px){

    .logo img{
        width:250px;
    }

    .card{
        width:95%;
    }

}

</style>
</head>
<body>

<!-- Logo -->
<div class="logo">
    <img src="logo.png" alt="Diamond Exch 99">
</div>

<!-- Content -->
<div class="content">

    <div class="card">

        <div class="card-header">
            Login <i class="fas fa-hand-point-down"></i>
        </div>

        <div class="card-body">

            <div class="form-group">
                <label>Current Password:</label>
                <input type="password"
                       class="form-control"
                       placeholder="Enter Current password">
            </div>

            <div class="form-group">
                <label>New Password:</label>
                <input type="password"
                       class="form-control"
                       placeholder="Enter New Password">
            </div>

            <div class="form-group">
                <label>Confirm Password:</label>
                <input type="password"
                       class="form-control"
                       placeholder="Confirm New Password">
            </div>

            <button class="btn">
                Change Password
            </button>

        </div>

    </div>

</div>

</body>
</html>
