<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Classic Exch 99</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card bg-secondary text-white border-0 shadow-lg">
                    <div class="card-body p-5">
                        
                        <!-- Logo -->
                        <div class="text-center mb-4">
                            <img src="logo.png" alt="Classic Exch 99 Logo" class="img-fluid logo-img" style="max-height: 80px;">
                        </div>

                        <h3 class="text-center mb-4">Sign In</h3>

                        <!-- Login Form -->
                        <form action="/login-endpoint" method="POST">
                            <!-- Username Field -->
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="username" name="username" required autocomplete="username">
                            </div>

                            <!-- Password Field -->
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control bg-dark text-white border-secondary" id="password" name="password" required autocomplete="current-password">
                            </div>

                            <!-- Remember Me & Forgot Password -->
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">Remember me</label>
                                </div>
                                <a href="#" class="text-info text-decoration-none small">Forgot Password?</a>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-info w-100 py-2 fw-bold text-dark">Log In</button>
                        </form>

                    </div>
                </div>
                
                <!-- Extra Links -->
                <div class="text-center mt-3">
                    <p class="text-muted small">Don't have an account? <a href="#" class="text-info text-decoration-none">Register here</a></p>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
